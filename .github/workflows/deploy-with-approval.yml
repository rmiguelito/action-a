name: Deploy with Approval

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: echo "Running tests..."

      - name: Build application
        run: echo "Building application..."

  request-deploy:
    uses: rmiguelito/add-fields-to-project@main
    with:
      project_number: '1'
      project_id: 'PVT_kwHOAPMWaM4BRDsm'
      repo_name: '${{ github.event.repository.name }}'
      run_id: '${{ github.run_id }}'
      ref_name: '${{ github.ref_name }}'
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  deploy:
    needs: [build, request-deploy]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Update deployment status to deploying
        uses: ./.github/workflows/add-fields-to-project.yml
        with:
          project_number: '1'
          project_id: 'PVT_kwHOAPMWaM4BRDsm'
          repo_name: '${{ github.event.repository.name }}'
          run_id: '${{ github.run_id }}'
          ref_name: '${{ github.ref_name }}'
          status: 'deploying'
          item_id: '${{ needs.request-deploy.outputs.item-id }}'
        secrets:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}

      - name: Deploy to production
        run: echo "Deploying to production..."

      - name: Update deployment status to completed
        if: success()
        uses: rmiguelito/add-fields-to-project@main
        with:
          project_number: '1'
          project_id: 'PVT_kwHOAPMWaM4BRDsm'
          repo_name: '${{ github.event.repository.name }}'
          run_id: '${{ github.run_id }}'
          ref_name: '${{ github.ref_name }}'
          status: 'completed'
          item_id: '${{ needs.request-deploy.outputs.item-id }}'
        secrets:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}

      - name: Update deployment status to failed
        if: failure()
        uses: rmiguelito/add-fields-to-project@main
        with:
          project_number: '1'
          project_id: 'PVT_kwHOAPMWaM4BRDsm'
          repo_name: '${{ github.event.repository.name }}'
          run_id: '${{ github.run_id }}'
          ref_name: '${{ github.ref_name }}'
          status: 'failed'
          item_id: '${{ needs.request-deploy.outputs.item-id }}'
        secrets:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
